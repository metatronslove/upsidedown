<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, viewport-fit=cover" />
    <title>↕ FlipScript — Upside-Down Studio</title>
    <style>
        /* ----- Tüm cihazlar için akışkan tasarım (clamp, flex, scroll) ----- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0b0a16;
            --surface: rgba(22, 20, 45, 0.85);
            --surface2: rgba(35, 32, 65, 0.9);
            --surface3: rgba(55, 48, 95, 0.9);
            --text: #f2f0ff;
            --text-dim: #b0aad8;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.3);
            --border: rgba(80, 70, 140, 0.5);
            --radius: clamp(16px, 3vw, 28px);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            --font-size-base: clamp(0.875rem, 1.2vw, 1.05rem);
            --space-xs: clamp(0.2rem, 0.4vw, 0.5rem);
            --space-sm: clamp(0.4rem, 0.8vw, 0.75rem);
            --space-md: clamp(0.75rem, 1.5vw, 1.5rem);
            --space-lg: clamp(1.25rem, 2.5vw, 2.25rem);
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            font-size: var(--font-size-base);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-sm);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(167, 139, 250, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
            -webkit-tap-highlight-color: transparent;
        }
        .app {
            width: min(100% - var(--space-sm), 880px);
            background: var(--surface);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border-radius: var(--radius);
            padding: var(--space-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: padding 0.3s ease;
        }
        @media (max-width: 480px) {
            .app { padding: var(--space-md); border-radius: clamp(12px, 4vw, 18px); }
        }
        /* ----- Brand ----- */
        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-sm) var(--space-md);
            margin-bottom: var(--space-lg);
        }
        .brand-left {
            display: flex;
            align-items: center;
            gap: clamp(0.3rem, 1vw, 0.75rem);
            flex-wrap: wrap;
        }
        .brand-icon {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            line-height: 1;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }
        .brand h1 {
            font-size: clamp(1.2rem, 3vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ddd6fe, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .brand-tagline {
            font-size: clamp(0.55rem, 0.8vw, 0.7rem);
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--surface2);
            padding: 0.15rem 0.7rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            -webkit-text-fill-color: var(--text-dim);
            white-space: nowrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--surface2);
            padding: 0.15rem 0.65rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            font-size: clamp(0.6rem, 0.8vw, 0.75rem);
            color: var(--text-dim);
            white-space: nowrap;
        }
        /* ----- Input / Output ----- */
        .input-section,
        .output-section {
            margin-bottom: var(--space-md);
        }
        .input-header,
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
        }
        .input-header label,
        .output-header label {
            font-weight: 600;
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .input-header label span,
        .output-header label span {
            color: var(--accent);
        }
        .char-counter {
            font-size: clamp(0.65rem, 0.8vw, 0.8rem);
            color: var(--text-dim);
            background: var(--surface2);
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .char-counter.warn { border-color: #fbbf24; color: #fbbf24; }
        .char-counter.danger { border-color: #f87171; color: #f87171; }
        textarea {
            width: 100%;
            min-height: clamp(80px, 20vh, 140px);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: clamp(10px, 1.5vw, 14px);
            color: var(--text);
            font-size: clamp(0.95rem, 1.3vw, 1.15rem);
            font-family: var(--font);
            padding: var(--space-sm) var(--space-md);
            resize: vertical;
            transition: border-color 0.25s, box-shadow 0.25s;
            line-height: 1.6;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        textarea::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }
        .preview-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: clamp(10px, 1.5vw, 14px);
            padding: var(--space-sm) var(--space-md);
            min-height: clamp(60px, 15vh, 100px);
            font-size: clamp(0.95rem, 1.3vw, 1.15rem);
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
            color: var(--text);
            transition: border-color 0.25s;
            font-family: var(--font);
            overflow-y: auto;
        }
        .preview-box.placeholder {
            color: var(--text-dim);
            opacity: 0.4;
            font-style: italic;
        }
        /* ----- Emoji Keyboard ----- */
        .emoji-section {
            margin: var(--space-sm) 0 var(--space-xs);
        }
        .emoji-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: clamp(0.7rem, 0.9vw, 0.85rem);
            font-weight: 500;
            color: var(--text-dim);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.25rem 0.9rem 0.25rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-family: var(--font);
            touch-action: manipulation;
        }
        .emoji-toggle:hover {
            border-color: var(--accent);
            color: var(--text);
            background: var(--surface3);
        }
        .emoji-toggle:active {
            transform: scale(0.96);
        }
        .emoji-toggle .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
        }
        .emoji-toggle .arrow.open {
            transform: rotate(180deg);
        }
        .emoji-grid-wrap {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }
        .emoji-grid-wrap.open {
            max-height: 75vh;
            opacity: 1;
            margin-top: var(--space-sm);
        }
        .emoji-categories {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: var(--space-xs);
            padding: var(--space-xs) 0 var(--space-sm);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .emoji-categories::-webkit-scrollbar {
            height: 3px;
        }
        .emoji-categories::-webkit-scrollbar-track {
            background: transparent;
        }
        .emoji-categories::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .emoji-cat-btn {
            flex: 0 0 auto;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-dim);
            font-size: clamp(0.6rem, 0.7vw, 0.75rem);
            padding: 0.2rem 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font);
            white-space: nowrap;
            touch-action: manipulation;
        }
        .emoji-cat-btn.active {
            background: var(--accent);
            color: #0b0a16;
            border-color: var(--accent);
            font-weight: 600;
        }
        .emoji-cat-btn:hover:not(.active) {
            background: var(--surface3);
            color: var(--text);
        }
        .emoji-cat-btn:active {
            transform: scale(0.94);
        }
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(0.15rem, 0.4vw, 0.4rem);
            background: var(--surface2);
            border-radius: clamp(10px, 1.5vw, 14px);
            padding: var(--space-sm);
            border: 1px solid var(--border);
            max-height: clamp(200px, 50vh, 320px);
            overflow-y: auto;
            align-content: flex-start;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .emoji-grid::-webkit-scrollbar {
            width: 4px;
        }
        .emoji-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .emoji-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .emoji-btn {
            font-size: clamp(1.4rem, 3vw, 2rem);
            line-height: 1;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.1rem;
            border-radius: 10px;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: clamp(2.2rem, 6vw, 3rem);
            min-height: clamp(2.2rem, 6vw, 3rem);
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', system-ui, sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .emoji-btn:hover {
            background: var(--surface3);
            transform: scale(1.12);
        }
        .emoji-btn:active {
            transform: scale(0.88);
            background: var(--surface3);
        }
        /* ----- Copy Button ----- */
        .output-actions {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            flex-wrap: wrap;
        }
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: clamp(0.65rem, 0.8vw, 0.8rem);
            font-weight: 600;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            border: none;
            background: var(--surface3);
            color: var(--text-dim);
            cursor: not-allowed;
            transition: all 0.25s;
            font-family: var(--font);
            opacity: 0.4;
            pointer-events: none;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .copy-btn.enabled {
            background: var(--accent);
            color: #0b0a16;
            cursor: pointer;
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .copy-btn.enabled:hover {
            transform: scale(1.04);
            box-shadow: 0 0 32px var(--accent-glow);
        }
        .copy-btn.enabled:active {
            transform: scale(0.94);
        }
        .copy-btn svg {
            width: clamp(14px, 1.2vw, 18px);
            height: clamp(14px, 1.2vw, 18px);
            flex-shrink: 0;
        }
        /* ----- Footer ----- */
        .footer-meta {
            margin-top: var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-sm);
            font-size: clamp(0.55rem, 0.7vw, 0.7rem);
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: var(--space-md);
        }
        .footer-meta .info-note {
            background: var(--surface2);
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .footer-meta a {
            color: var(--accent);
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .footer-meta a:hover {
            opacity: 1;
        }
        .emoji-error {
            color: #f87171;
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            padding: var(--space-sm);
            width: 100%;
            text-align: center;
            line-height: 1.5;
        }
        .emoji-error small {
            display: block;
            font-size: clamp(0.6rem, 0.7vw, 0.7rem);
            opacity: 0.6;
            margin-top: 0.2rem;
        }
        @media (max-width: 340px) {
            .brand-left {
                gap: 0.2rem;
            }
            .brand h1 {
                font-size: clamp(0.9rem, 4vw, 1.1rem);
            }
            .brand-tagline {
                display: none;
            }
            .badge {
                font-size: 0.55rem;
                padding: 0.05rem 0.4rem;
            }
            .emoji-btn {
                min-width: 1.8rem;
                min-height: 1.8rem;
                font-size: 1.2rem;
            }
            .emoji-grid {
                padding: 0.3rem;
                gap: 0.1rem;
            }
        }
        @media (min-width: 1400px) {
            .app {
                padding: var(--space-lg) var(--space-xl);
            }
            :root {
                --space-xl: clamp(2.5rem, 3vw, 3.5rem);
            }
        }
    </style>
</head>
<body>
    <main class="app" role="main">
        <header class="brand">
            <div class="brand-left">
                <span class="brand-icon" aria-hidden="true">↕</span>
                <h1>FlipScript</h1>
                <span class="brand-tagline">Upside‑Down Studio</span>
            </div>
            <span class="badge">⚡ 180°</span>
        </header>

        <section class="input-section" aria-label="Input area">
            <div class="input-header">
                <label for="inputText">✏️ <span>Giriş</span></label>
                <span class="char-counter" id="inputCounter" aria-live="polite">0</span>
            </div>
            <textarea id="inputText" placeholder="Metninizi buraya yazın… Türkçe, İngilizce, Fransızca, sayılar ve emojiler desteklenir." spellcheck="true" autofocus></textarea>

            <div class="emoji-section">
                <button class="emoji-toggle" id="emojiToggle" type="button" aria-expanded="false">
                    <span aria-hidden="true">😊</span> Emoji Klavye
                    <span class="arrow" aria-hidden="true">▾</span>
                </button>
                <div class="emoji-grid-wrap" id="emojiWrap">
                    <div class="emoji-categories" id="emojiCategories"></div>
                    <div class="emoji-grid" id="emojiGrid" role="listbox" aria-label="Emoji seçenekleri">
                        <span style="color:var(--text-dim); font-size:0.8rem; padding:0.5rem; width:100%; text-align:center;">Yükleniyor...</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="output-section" aria-label="Output area">
            <div class="output-header">
                <label for="outputPreview">🔄 <span>Baş Aşağı</span></label>
                <div class="output-actions">
                    <span class="char-counter" id="outputCounter" aria-live="polite">0</span>
                    <button class="copy-btn" id="copyBtn" type="button" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        Kopyala
                    </button>
                </div>
            </div>
            <div class="preview-box placeholder" id="outputPreview">
                <span class="placeholder-text">Burada baş aşağı metin görünecek…</span>
            </div>
        </section>

        <footer class="footer-meta">
            <span class="info-note">ℹ️ “31” → “Ɛ⇂” (tüm rakamlar için aynıdır)</span>
            <span><span class="badge">🔗 <a href="#" onclick="return false;">flipscript</a></span></span>
        </footer>
    </main>

    <script>
        (function() {
            'use strict';

            // --------------------------------------------------------------
            // 1. UPSIDE-DOWN MAP – Tüm sohbet karakterleri (noktalama, sembol, tırnak)
            // --------------------------------------------------------------
            const UPSIDE_DOWN_MAP = {
                // ---- HARFLER ----
                'a': 'ɐ',

                'é': 'é',

                // ---- ÇİZGİLER ----
                '-': '-',

                // ---- TIRNAK İŞARETLERİ (çift ve tek, düz ve kıvrık) ----
                '"': '"',

                '«': '»',
                '»': '«',

                // ---- PARANTEZ VE KÖŞELİ ----
                '(': ')',
                ')': '(',
                '[': ']',

                '{': '}',

                '>': '<',

                // ---- SEMBOLLER (sohbet) ----
                '&': '⅋',
                '@': '@', // tersi yok
                '#': '#',
                '$': '$',
                '%': '%',
                '^': '^',

                '§': '§',
                '¶': '¶',
                '•': '•',
                '◦': '◦',

                // ---- BOŞLUK ----
                ' ': ' '
            };

            // --------------------------------------------------------------
            // 2. DOM REFS
            // --------------------------------------------------------------
            const inputText = document.getElementById('inputText');
            const outputPreview = document.getElementById('outputPreview');
            const inputCounter = document.getElementById('inputCounter');
            const outputCounter = document.getElementById('outputCounter');
            const copyBtn = document.getElementById('copyBtn');
            const emojiGrid = document.getElementById('emojiGrid');
            const emojiCategories = document.getElementById('emojiCategories');
            const emojiToggle = document.getElementById('emojiToggle');
            const emojiWrap = document.getElementById('emojiWrap');

            let allEmojis = [];
            let currentCategory = '';

            // --------------------------------------------------------------
            // 3. CONVERTER
            // --------------------------------------------------------------
            function convertToUpsideDown(text) {
                return text.split('').reverse().map(ch => UPSIDE_DOWN_MAP[ch] || ch).join('');
            }

            // --------------------------------------------------------------
            // 4. UPDATE UI
            // --------------------------------------------------------------
            function updateUI() {
                const raw = inputText.value;
                const converted = convertToUpsideDown(raw);

                const inputLen = raw.length;
                inputCounter.textContent = inputLen;
                inputCounter.classList.remove('warn', 'danger');
                if (inputLen > 200) inputCounter.classList.add('warn');
                if (inputLen > 500) inputCounter.classList.add('danger');

                const outputLen = converted.length;
                outputCounter.textContent = outputLen;

                if (converted.trim().length === 0) {
                    outputPreview.innerHTML = '<span class="placeholder-text">Burada baş aşağı metin görünecek…</span>';
                    outputPreview.classList.add('placeholder');
                    copyBtn.disabled = true;
                    copyBtn.classList.remove('enabled');
                } else {
                    outputPreview.textContent = converted;
                    outputPreview.classList.remove('placeholder');
                    copyBtn.disabled = false;
                    copyBtn.classList.add('enabled');
                }
            }

            // --------------------------------------------------------------
            // 5. COPY
            // --------------------------------------------------------------
            copyBtn.addEventListener('click', function() {
                if (this.disabled) return;
                const text = outputPreview.textContent;
                if (!text || text === 'Burada baş aşağı metin görünecek…') return;
                navigator.clipboard.writeText(text).then(() => {
                    const orig = copyBtn.innerHTML;
                    copyBtn.innerHTML = '✅ Kopyalandı!';
                    setTimeout(() => { copyBtn.innerHTML = orig; }, 1800);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    alert('Panoya kopyalandı!');
                });
            });

            // --------------------------------------------------------------
            // 6. EMOJI KEYBOARD
            // --------------------------------------------------------------
            function renderEmojisForCategory(category) {
                const filtered = allEmojis.filter(e => e.category === category);
                if (filtered.length === 0) {
                    emojiGrid.innerHTML =
                        `<span style="color:var(--text-dim); font-size:0.8rem; padding:0.5rem; width:100%; text-align:center;">Bu kategoride emoji yok.</span>`;
                    return;
                }
                let html = '';
                filtered.forEach(item => {
                    const emoji = item.emoji || '';
                    const desc = item.description || item.aliases?.[0] || '';
                    html += `<button class="emoji-btn" type="button" aria-label="${desc}" title="${desc}">${emoji}</button>`;
                });
                emojiGrid.innerHTML = html;

                emojiGrid.querySelectorAll('.emoji-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const emoji = this.textContent.trim();
                        if (!emoji) return;
                        const start = inputText.selectionStart;
                        const end = inputText.selectionEnd;
                        const val = inputText.value;
                        inputText.value = val.substring(0, start) + emoji + val.substring(end);
                        inputText.focus();
                        const newPos = start + emoji.length;
                        inputText.selectionStart = inputText.selectionEnd = newPos;
                        updateUI();
                        inputText.dispatchEvent(new Event('input'));
                    });
                });
            }

            function renderCategories() {
                const categories = [...new Set(allEmojis.map(e => e.category).filter(Boolean))];
                if (categories.length === 0) {
                    emojiCategories.innerHTML = '';
                    return;
                }
                currentCategory = categories[0];
                let html = '';
                categories.forEach(cat => {
                    const active = cat === currentCategory ? 'active' : '';
                    html += `<button class="emoji-cat-btn ${active}" data-category="${cat}">${cat}</button>`;
                });
                emojiCategories.innerHTML = html;

                emojiCategories.querySelectorAll('.emoji-cat-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = this.dataset.category;
                        if (!cat) return;
                        currentCategory = cat;
                        document.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        renderEmojisForCategory(cat);
                    });
                });

                if (categories.length > 0) {
                    renderEmojisForCategory(categories[0]);
                }
            }

            function loadEmojis() {
                fetch('emoji.json')
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status} - Dosya bulunamadı`);
                        return res.json();
                    })
                    .then(data => {
                        if (!Array.isArray(data) || data.length === 0) {
                            throw new Error('emoji.json boş veya geçersiz');
                        }
                        allEmojis = data;
                        renderCategories();
                    })
                    .catch(err => {
                        console.error('Emoji yükleme hatası:', err);
                        emojiGrid.innerHTML = `
                            <div class="emoji-error">
                                ⚠️ emoji.json yüklenemedi
                                <small>Dosya aynı dizinde mi? Yerel sunucu (Live Server) kullanıyor musun?</small>
                            </div>`;
                        emojiCategories.innerHTML = '';
                    });
            }

            // Toggle
            emojiToggle.addEventListener('click', function() {
                const isOpen = emojiWrap.classList.toggle('open');
                this.setAttribute('aria-expanded', isOpen);
                this.querySelector('.arrow').classList.toggle('open', isOpen);
            });

            // --------------------------------------------------------------
            // 7. INIT
            // --------------------------------------------------------------
            inputText.addEventListener('input', updateUI);
            updateUI();
            loadEmojis();

            console.log('✅ FlipScript – tüm noktalama ve semboller eklendi.');
        })();
    </script>
</body>
</html>
